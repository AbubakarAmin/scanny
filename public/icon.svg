<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#0a0a16" />
  <g filter="url(#glow)">
    <!-- Ticket Shape -->
    <path d="M120 180 C 120 200, 100 200, 100 220 L 100 292 C 100 312, 120 312, 120 332 L 392 332 C 392 312, 412 312, 412 292 L 412 220 C 412 200, 392 200, 392 180 Z" 
          fill="url(#grad)" />
    <!-- Inner Border dashed line -->
    <path d="M140 200 L 372 200 M 140 312 L 372 312" stroke="#ffffff" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" />
    <!-- Ticket Notch cuts -->
    <line x1="200" y1="200" x2="200" y2="312" stroke="#0a0a16" stroke-width="6" stroke-dasharray="10 10" />
    <!-- Ticket Graphic (🎟️ outline) -->
    <path d="M 240 236 L 330 236 M 240 276 L 330 276" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
    <circle cx="285" cy="256" r="28" fill="none" stroke="#ffffff" stroke-width="8" />
  </g>
</svg>
